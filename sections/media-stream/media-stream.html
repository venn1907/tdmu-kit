<section
  id="media-stream-section"
  class="tdmu-section tdmu-section--media-stream"
>
  <div class="container">
    <div class="tdmu-media-stream-shell">
      <div class="tdmu-media-stream-layout">
        <section id="media-news-column" class="tdmu-media-news">
          <div class="tdmu-media-column-head">
            <h3 class="tdmu-media-column-title tdmu-media-column-title--news">
              Tin tức
            </h3>
          </div>
          <div id="media-news-list" class="tdmu-media-news-list"></div>
        </section>

        <aside id="media-notice-column" class="tdmu-media-notice">
          <div class="tdmu-media-column-head tdmu-media-column-head--notice">
            <h3 class="tdmu-media-column-title tdmu-media-column-title--notice">
              Thông báo nhanh
            </h3>
          </div>
          <div class="tdmu-media-notice-tabs-wrap">
            <div id="media-notice-tabs" class="tdmu-media-notice-tabs"></div>
            <div class="tdmu-media-notice-filter-wrap">
              <button
                id="media-notice-filter-button"
                class="tdmu-media-notice-filter"
                type="button"
              >
                <span id="media-notice-filter-label">Tổng hợp</span>
              </button>
              <div
                id="media-notice-filter-menu"
                class="tdmu-media-notice-filter-menu"
                hidden
              ></div>
            </div>
          </div>
          <div id="media-notice-list" class="tdmu-media-notice-list"></div>
        </aside>
      </div>
    </div>
  </div>
</section>
