<section class="tdmu-section tdmu-section--hero">
  <div id="featured-slider" class="tdmu-hero-slider">
    <div class="tdmu-slider-track" id="featured-slider-track">
      <figure class="tdmu-slide">
        <img
          class="tdmu-slide-media"
          src="assets/img/banner.jpg"
          alt="Sinh viên và giảng viên Viện Công nghệ số tại TDMU"
          loading="eager"
          decoding="async"
        />
      </figure>
      <figure class="tdmu-slide">
        <img
          class="tdmu-slide-media"
          src="assets/img/bg3.jpg"
          alt="Không gian học thuật và cảnh quan học tập tại TDMU"
          loading="lazy"
          decoding="async"
        />
      </figure>
      <figure class="tdmu-slide">
        <img
          class="tdmu-slide-media"
          src="assets/img/bg5.jpg"
          alt="Hoạt động kết nối học thuật và trải nghiệm sinh viên"
          loading="lazy"
          decoding="async"
        />
      </figure>
      <figure class="tdmu-slide">
        <img
          class="tdmu-slide-media"
          src="assets/img/bg10.jpg"
          alt="Chương trình đào tạo và môi trường học tập số của TDMU"
          loading="lazy"
          decoding="async"
        />
      </figure>
    </div>

    <div class="tdmu-slider-controls">
      <button class="tdmu-slider-control prev" type="button" aria-label="Ảnh trước">
        <span class="material-symbols-rounded">chevron_left</span>
      </button>
      <button class="tdmu-slider-control next" type="button" aria-label="Ảnh tiếp theo">
        <span class="material-symbols-rounded">chevron_right</span>
      </button>
    </div>

    <div class="tdmu-slider-dots">
      <button class="tdmu-slider-dot is-active" type="button" data-slide="0" aria-label="Đi đến ảnh 1"></button>
      <button class="tdmu-slider-dot" type="button" data-slide="1" aria-label="Đi đến ảnh 2"></button>
      <button class="tdmu-slider-dot" type="button" data-slide="2" aria-label="Đi đến ảnh 3"></button>
      <button class="tdmu-slider-dot" type="button" data-slide="3" aria-label="Đi đến ảnh 4"></button>
    </div>
  </div>
</section>
