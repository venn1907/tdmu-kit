<section class="tdmu-map-section">
  <div class="container">
    <div class="tdmu-map-shell">
      <div class="tdmu-map-copy">
        <p class="tdmu-map-kicker">Khám phá nhanh</p>
        <h2 class="tdmu-map-title">Khám phá</h2>
        <p class="tdmu-map-description">
          Xem giới thiệu ngắn và tra cứu vị trí của trường.
        </p>
      </div>

      <div class="tdmu-map-grid">
        <div class="tdmu-map-card">
          <div class="tdmu-map-card-head">
            <h3 class="tdmu-map-card-title">Giới thiệu</h3>
          </div>

          <div class="tdmu-map-frame tdmu-map-frame--video">
            <iframe
              src="https://www.youtube.com/embed/74OeDErqnY0?si=yCFbBRPSJF4zk1RT"
              loading="lazy"
              allow="
                accelerometer;
                autoplay;
                clipboard-write;
                encrypted-media;
                gyroscope;
                picture-in-picture;
                web-share;
              "
              allowfullscreen
              title="Video"
            ></iframe>
          </div>
        </div>

        <div class="tdmu-map-card">
          <div class="tdmu-map-card-head">
            <h3 class="tdmu-map-card-title">Bản đồ trường</h3>
          </div>

          <div class="tdmu-map-frame">
            <iframe
              src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3916.770200633684!2d106.6752891!3d10.9807104!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x3174d1085e2b1c37%3A0x73bfa5616464d0ee!2zVHLGsOG7nW5nIMSQ4bqhaSBo4buNYyBUaOG7pyBE4bqndSBN4buZdA!5e0!3m2!1svi!2s!4v1776330445645!5m2!1svi!2s"
              loading="lazy"
              referrerpolicy="no-referrer-when-downgrade"
              allowfullscreen
              title="Bản đồ Trường Đại học Thủ Dầu Một"
            ></iframe>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
