<section
  class="tdmu-section tdmu-section-tight-top tdmu-section--gallery-band"
>
  <div class="container">
    <section class="tdmu-panel tdmu-panel--gallery">
      <div class="tdmu-section-head tdmu-media-library-head">
        <h2 class="tdmu-section-title">Thư viện hình ảnh, video</h2>
      </div>

      <div class="tdmu-media-library" data-media-library>
        <button
          class="tdmu-media-tile tdmu-media-tile--feature"
          type="button"
          data-media-item
          data-type="image"
          data-src="assets/img/banner.jpg"
          data-title="Hoạt động Viện Công nghệ số"
        >
          <img
            src="assets/img/banner.jpg"
            alt="Hoạt động Viện Công nghệ số"
            loading="lazy"
          />
        </button>

        <button
          class="tdmu-media-tile"
          type="button"
          data-media-item
          data-type="video"
          data-src="https://www.youtube.com/embed/dQw4w9WgXcQ"
          data-title="Video giới thiệu"
        >
          <img
            src="assets/img/bg-landing.jpg"
            alt="Video giới thiệu"
            loading="lazy"
          />
          <span class="tdmu-media-play material-symbols-rounded">play_arrow</span>
        </button>

        <button
          class="tdmu-media-tile"
          type="button"
          data-media-item
          data-type="image"
          data-src="assets/img/bg3.jpg"
          data-title="Không gian nghiên cứu"
        >
          <img src="assets/img/bg3.jpg" alt="Không gian nghiên cứu" loading="lazy" />
        </button>

        <button
          class="tdmu-media-tile"
          type="button"
          data-media-item
          data-type="video"
          data-src="https://www.youtube.com/embed/dQw4w9WgXcQ"
          data-title="Khoảnh khắc TDMU"
        >
          <img src="assets/img/city-profile.jpg" alt="Khoảnh khắc TDMU" loading="lazy" />
          <span class="tdmu-media-play material-symbols-rounded">play_arrow</span>
        </button>

        <button
          class="tdmu-media-tile tdmu-media-tile--more"
          type="button"
          data-media-item
          data-type="image"
          data-src="assets/img/bg10.jpg"
          data-title="Không gian học thuật"
        >
          <img src="assets/img/bg10.jpg" alt="Không gian học thuật" loading="lazy" />
          <strong data-media-more-count></strong>
        </button>

        <button
          class="tdmu-media-tile"
          type="button"
          data-media-item
          data-type="image"
          data-src="assets/img/bg5.jpg"
          data-title="Kết nối học thuật"
        >
          <img src="assets/img/bg5.jpg" alt="Kết nối học thuật" loading="lazy" />
        </button>

        <button
          class="tdmu-media-tile"
          type="button"
          data-media-item
          data-type="video"
          data-src="https://www.youtube.com/embed/dQw4w9WgXcQ"
          data-title="Video hoạt động"
        >
          <img src="assets/img/city-profile.jpg" alt="Video hoạt động" loading="lazy" />
          <span class="tdmu-media-play material-symbols-rounded">play_arrow</span>
        </button>
      </div>
    </section>
  </div>

  <div class="tdmu-media-viewer" data-media-viewer hidden>
    <button
      class="tdmu-media-viewer-close"
      type="button"
      data-media-close
    >
      <span class="material-symbols-rounded">close</span>
    </button>
    <button
      class="tdmu-media-viewer-nav tdmu-media-viewer-nav--prev"
      type="button"
      data-media-prev
    >
      <span class="material-symbols-rounded">chevron_left</span>
    </button>
    <div class="tdmu-media-viewer-frame" data-media-frame></div>
    <button
      class="tdmu-media-viewer-nav tdmu-media-viewer-nav--next"
      type="button"
      data-media-next
    >
      <span class="material-symbols-rounded">chevron_right</span>
    </button>
  </div>
</section>
