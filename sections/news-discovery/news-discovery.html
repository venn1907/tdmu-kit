<section id="news-discovery-section" class="tdmu-section">
  <div class="container">
    <div class="tdmu-discovery-shell">
      <div class="tdmu-discovery-head">
        <div>
          <p class="tdmu-discovery-kicker mb-2">Kho nội dung</p>
          <h2 class="tdmu-discovery-title mb-2">Tin tức và thông báo</h2>
          <p class="tdmu-discovery-subtitle mb-0">
            Tìm nhanh các bài viết, thông báo học vụ và hoạt động mới nhất trong bộ section template.
          </p>
        </div>
        <p class="tdmu-discovery-count mb-0">
          <span id="discoveryResultCount">0 kết quả</span>
        </p>
      </div>

      <div class="tdmu-discovery-filters">
        <div class="tdmu-discovery-field">
          <label class="form-label mb-1">Danh mục</label>
          <div class="tdmu-select" id="discoveryCategorySelect">
            <button class="tdmu-select-trigger" type="button" id="discoveryCategoryTrigger">
              <span id="discoveryCategoryLabel">Tất cả</span>
              <span class="material-symbols-rounded">expand_more</span>
            </button>
            <div class="tdmu-select-menu" id="discoveryCategoryMenu"></div>
          </div>
        </div>

        <div class="tdmu-discovery-field tdmu-discovery-field--search">
          <label class="form-label mb-1" for="discoverySearchInput">Tìm kiếm</label>
          <div class="input-group input-group-outline">
            <span class="input-group-text">
              <span class="material-symbols-rounded opacity-6">search</span>
            </span>
            <input
              id="discoverySearchInput"
              type="text"
              class="form-control"
              placeholder="Nhập tiêu đề hoặc nội dung tóm tắt..."
            />
          </div>
        </div>
      </div>

      <div class="tdmu-discovery-grid row g-4" id="discoveryGrid"></div>
      <div class="tdmu-discovery-pagination" id="discoveryPagination"></div>
    </div>
  </div>
</section>
