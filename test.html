<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Test Section - Viện Công nghệ số</title>

    <link rel="icon" type="image/png" href="assets/img/icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,500,0,0"
    />

    <link rel="stylesheet" href="assets/css/material-kit.min.css?v=3.1.0" />
    <link rel="stylesheet" href="css/core.css" />
    <link rel="stylesheet" href="css/header-footer.css" />

    <!--
      Import CSS của section cần test tại đây.
      Ví dụ:
      <link rel="stylesheet" href="sections/featured-slider/featured-slider.css" />
    -->
    <link rel="stylesheet" href="sections/featured-slider/featured-slider.css" />
  </head>

  <body data-page="test">
    <header id="site-header"></header>

    <main id="main-content" class="tdmu-section-test-main">
      <!-- Chỉ giữ đúng 1 slot section để test -->
      <div id="section-test-slot" data-section="featured-slider"></div>
    </main>

    <footer id="site-footer"></footer>

    <script src="assets/js/core/bootstrap.bundle.min.js"></script>
    <script src="assets/js/material-kit.min.js"></script>
    <script type="module">
      import { injectFragment } from "./js/core/include.js";
      import { initSectionsFromDom } from "./js/core/section-registry.js";
      import { initHeaderLayout } from "./layouts/header/header.js";
      import { initFooterLayout } from "./layouts/footer/footer.js";

      /*
        Đổi data-section của #section-test-slot để test section khác.
        Ví dụ:
        <div id="section-test-slot" data-section="media-stream"></div>
      */

      await injectFragment("#site-header", "layouts/header/header.html");
      await injectFragment("#site-footer", "layouts/footer/footer.html");
      await initSectionsFromDom();

      initHeaderLayout();
      initFooterLayout();
    </script>
  </body>
</html>
